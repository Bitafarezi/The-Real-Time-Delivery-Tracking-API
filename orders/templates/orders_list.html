<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivary Orders Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex justify-between items-center border-b pb-5 mb-8">
            
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Orders Dashboard</h1>
                <p class="text-gray-500 text-sm mt-1">Manage deleveries in real-time</p>
            </div>

            <div class="flex items-center space-x-3 bg-white shadow-sm border px-4 py-2 rounded-lg">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-plus"></div>
                <span class="text-sm font-medium text-gray-700" id="username-display">Loading User...</span>
            </div>

        </div>

        <!-- Orders Grid Container -->
        <div id="orders-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

            <!-- orders card will be rendered here by js -->
            <div class="col-span-full text-center py-12 text-gray-400">Loading orders...</div>
        </div>
        
    </div>
    
</body>
</html>
